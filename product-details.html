<!DOCTYPE html>
<html>
<head>
  <title>Product Details</title>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

  <div class="card shadow p-4">

    <div class="row">

      <!-- 🔹 Image -->
      <div class="col-md-5 text-center">
        <img id="image" class="img-fluid">
      </div>

      <!-- 🔹 Details -->
      <div class="col-md-7">

        <h2 id="name"></h2>

        <h3 class="text-success mb-3" id="price"></h3>

        <!-- Description -->
        <div id="desc" class="mb-3"></div>

        <!-- Quantity + Add -->
        <div class="d-flex align-items-center gap-3 mt-3">

          <div>
            <button class="btn btn-secondary" onclick="changeQty(-1)">-</button>
            <span id="qty" class="mx-2 fw-bold">1</span>
            <button class="btn btn-secondary" onclick="changeQty(1)">+</button>
          </div>

          <button id="addBtn" class="btn btn-success">
            🛒 Add to Cart
          </button>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/cart.js"></script>

<script>
const id = new URLSearchParams(window.location.search).get("id");

let quantity = 1;
let p = null;

// 🔥 Quantity Change
function changeQty(change){
  quantity += change;
  if(quantity < 1) quantity = 1;
  $("#qty").text(quantity);
}

// 🔥 Load Product
$.getJSON("data/products.json", function(products){
  p = products.find(x => x.id == id);

  $("#name").text(p.name);
  $("#price").text("₹" + p.price);
  $("#image").attr("src", p.image);

  // 🔥 Bullet Description
  let descHtml = "<ul>";
  p.description.forEach(d => {
    descHtml += `<li>${d}</li>`;
  });
  descHtml += "</ul>";

  $("#desc").html(descHtml);
});

// 🔥 Add to Cart
$("#addBtn").click(function(){
  addToCart(p, quantity);
});
</script>

</body>
</html>
