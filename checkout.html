<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

<div class="card p-4 shadow">
<h3>Checkout</h3>

<form id="form">
<input class="form-control mb-2" placeholder="Name" required>
<input class="form-control mb-2" placeholder="Email" required>
<textarea class="form-control mb-2" placeholder="Address" required></textarea>

<button class="btn btn-primary w-100">Place Order</button>
</form>

<h4 id="msg"></h4>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$("#form").submit(function(e){
e.preventDefault();
localStorage.removeItem("cart");
$("#msg").text("🎉 Order placed successfully!");
});
</script>

</body>
</html>
