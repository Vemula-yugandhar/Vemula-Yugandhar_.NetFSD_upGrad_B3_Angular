<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electronics Store</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <!-- Page Title -->
    <h2 class="text-center fw-bold mb-5">🛒 Electronics Store</h2>

    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="image-1.png" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text text-muted">High performance laptop for developers.</p>
                    <p class="fw-bold text-primary">₹55,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="image-2.png" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text text-muted">Latest Android smartphone.</p>
                    <p class="fw-bold text-primary">₹25,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-success btn-sm">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="image-3.png" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text text-muted">Noise cancelling wireless headphones.</p>
                    <p class="fw-bold text-primary">₹4,500</p>
                    <div class="mt-auto">
                        <button class="btn btn-warning btn-sm">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="image-4.png" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text text-muted">Fitness tracking smartwatch.</p>
                    <p class="fw-bold text-primary">₹8,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-danger btn-sm">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
