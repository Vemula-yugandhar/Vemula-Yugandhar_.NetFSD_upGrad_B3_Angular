<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Event Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">College Events</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Events</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 🔷 Dashboard -->
<div class="container mt-4">

  <div class="row">
    <!-- Event List -->
    <div class="col-md-8">
      <h3>Event List</h3>
      <ul class="list-group">
        <li class="list-group-item">Tech Fest</li>
        <li class="list-group-item">Cultural Night</li>
      </ul>
    </div>

    <!-- Add Event Button -->
    <div class="col-md-4 text-end">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#eventModal">
        Add Event
      </button>
    </div>
  </div>

</div>

<!-- 🔷 Modal -->
<div class="modal fade" id="eventModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Add Event</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form class="needs-validation" novalidate>

          <div class="mb-3">
            <label>Event Name</label>
            <input type="text" class="form-control" required>
            <div class="invalid-feedback">Enter event name</div>
          </div>

          <div class="mb-3">
            <label>Date</label>
            <input type="date" class="form-control" required>
          </div>

          <button class="btn btn-success w-100">Submit</button>

        </form>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
  'use strict';
  const forms = document.querySelectorAll('.needs-validation');

  forms.forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault();
      }
      form.classList.add('was-validated');
    });
  });
})();
</script>

</body>
</html>
