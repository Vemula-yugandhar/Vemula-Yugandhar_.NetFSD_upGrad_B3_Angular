<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background-color: #f8f9fa; }
    .hero { background: #0d6efd; color: white; padding: 60px; text-align: center; }
  </style>
</head>

<body>

<!-- 🔷 Navbar with Offcanvas -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand">Shop</a>

    <button class="btn btn-outline-light" data-bs-toggle="offcanvas" data-bs-target="#menu">
      Menu
    </button>
  </div>
</nav>

<div class="offcanvas offcanvas-start" id="menu">
  <div class="offcanvas-header">
    <h5>Menu</h5>
    <button class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <ul class="list-group">
      <li class="list-group-item">Home</li>
      <li class="list-group-item">Products</li>
    </ul>
  </div>
</div>

<!-- 🔷 Hero -->
<div class="hero">
  <h1>Welcome to Our Store</h1>
  <p>Best Deals Available</p>
</div>

<!-- 🔷 Carousel -->
<div id="carouselExample" class="carousel slide mt-3">
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="https://via.placeholder.com/800x300" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://via.placeholder.com/800x300" class="d-block w-100">
    </div>

  </div>

  <button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<!-- 🔷 Products -->
<div class="container mt-4">
  <div class="row">

    <div class="col-md-4">
      <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="card-body">
          <h5>Product 1</h5>
          <p>$10</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="card-body">
          <h5>Product 2</h5>
          <p>$20</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 🔷 Newsletter -->
<div class="container mt-4">
  <h4>Subscribe</h4>
  <form class="row g-2">
    <div class="col-md-8">
      <input type="email" class="form-control" placeholder="Enter email">
    </div>
    <div class="col-md-4">
      <button class="btn btn-primary w-100">Subscribe</button>
    </div>
  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
